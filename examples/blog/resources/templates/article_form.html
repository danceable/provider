{{define "title"}}{{if .Article.ID}}{{ t "form.edit" }}{{else}}{{ t "form.new" }}{{end}} — {{ t "app.name" }}{{end}}
{{define "content"}}
<h1>{{if .Article.ID}}{{ t "form.edit" }}{{else}}{{ t "form.new" }}{{end}}</h1>
{{if .ErrorKey}}<div class="error">{{ t .ErrorKey }}</div>{{end}}
<form method="post" action="{{.Action}}">
  <label for="title">{{ t "field.title" }}</label>
  <input type="text" id="title" name="title" value="{{.Article.Title}}">

  <label for="body">{{ t "field.body" }}</label>
  <textarea id="body" name="body">{{.Article.Body}}</textarea>

  <p>
    <button class="btn" type="submit">{{ t "action.save" }}</button>
    <a class="btn secondary" href="/dashboard">{{ t "action.cancel" }}</a>
  </p>
</form>
{{end}}
