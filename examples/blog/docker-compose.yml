services:
  app:
    build:
      # Build from this example's own directory; it consumes the published
      # provider module from the proxy.
      context: .
    ports:
      - "8085:8085"
    environment:
      BLOG_HTTP_ADDR: ":8085"
      BLOG_MONGO_URI: "mongodb://mongo:27017"
      BLOG_MONGO_DB: "blog"
      BLOG_PER_PAGE: "5"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  mongo-data:
